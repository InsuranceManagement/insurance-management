---
- name: Deploy frontend container to Azure VM
  hosts: frontend_vm
  become: true

  vars:
    frontend_image: "lucascastelano/insurance-management-frontend:{{ deploy_environment }}"
    frontend_container_name: "insurance-management-frontend-{{ deploy_environment }}"
    frontend_host_port: "{{ 3001 if deploy_environment == 'homolog' else 3000 }}"
    frontend_container_port: 3000

  tasks:
    - name: Validate deployment environment
      ansible.builtin.assert:
        that:
          - deploy_environment in ["homolog", "prod"]
        fail_msg: "deploy_environment must be homolog or prod"

    - name: Install Docker dependencies
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: Create Docker apt keyring directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add Docker apt repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: Install Docker
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Ensure Docker service is running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Login to Docker registry when credentials are provided
      community.docker.docker_login:
        username: "{{ docker_registry_username }}"
        password: "{{ docker_registry_password }}"
      when:
        - docker_registry_username | length > 0
        - docker_registry_password | length > 0

    - name: Pull frontend image
      community.docker.docker_image:
        name: "{{ frontend_image }}"
        source: pull
        force_source: true

    - name: Run frontend container
      community.docker.docker_container:
        name: "{{ frontend_container_name }}"
        image: "{{ frontend_image }}"
        state: started
        restart_policy: always
        recreate: true
        published_ports:
          - "{{ frontend_host_port }}:{{ frontend_container_port }}"
