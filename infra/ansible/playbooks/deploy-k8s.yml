---
- name: Deploy backend manifests to AKS
  hosts: kubernetes_deployer
  connection: local
  gather_facts: false

  tasks:
    - name: Validate deployment environment
      ansible.builtin.assert:
        that:
          - deploy_environment in ["homolog", "prod"]
        fail_msg: "deploy_environment must be homolog or prod"

    - name: Refresh AKS kubeconfig
      ansible.builtin.command:
        cmd: >-
          az aks get-credentials
          --resource-group {{ aks_resource_group }}
          --name {{ aks_cluster_name }}
          --overwrite-existing
      changed_when: true

    - name: Install ingress-nginx controller
      ansible.builtin.command:
        cmd: "kubectl apply -f {{ ingress_nginx_manifest_url }}"
      changed_when: true

    - name: Wait for ingress-nginx controller deployment
      ansible.builtin.command:
        cmd: >-
          kubectl rollout status deployment/ingress-nginx-controller
          -n {{ ingress_nginx_namespace }}
          --timeout=600s
      changed_when: false

    - name: Apply PostgreSQL Kubernetes manifests
      ansible.builtin.command:
        cmd: "kubectl apply -f {{ kubernetes_database_path }}"
      changed_when: true

    - name: Apply backend Kubernetes manifests
      ansible.builtin.command:
        cmd: "kubectl apply -f {{ kubernetes_backend_path }}"
      changed_when: true

    - name: Wait for ingress external address
      ansible.builtin.command:
        cmd: >-
          kubectl get service ingress-nginx-controller
          -n {{ ingress_nginx_namespace }}
          -o jsonpath="{.status.loadBalancer.ingress[0].ip}"
      register: ingress_external_ip
      changed_when: false
      retries: 30
      delay: 20
      until: ingress_external_ip.stdout | trim != ""

    - name: Show ingress external address
      ansible.builtin.debug:
        msg: "Ingress external IP: {{ ingress_external_ip.stdout | trim }}"
