name: cd

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cd-main
  cancel-in-progress: true

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible
          ansible-galaxy collection install community.docker

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.FRONTEND_SSH_PRIVATE_KEY_B64 }}" | base64 -d > ~/.ssh/frontend_vm_key
          chmod 600 ~/.ssh/frontend_vm_key

      - name: Check SSH key fingerprint
        run: |
          ssh-keygen -lf ~/.ssh/frontend_vm_key

      - name: Validate frontend connection inputs
        run: |
          if [ -z "${{ secrets.FRONTEND_VM_IP }}" ]; then
            echo "FRONTEND_VM_IP secret is empty"
            exit 1
          fi

          if [ -z "${{ secrets.FRONTEND_SSH_PRIVATE_KEY_B64 }}" ]; then
            echo "FRONTEND_SSH_PRIVATE_KEY_B64 secret is empty"
            exit 1
          fi

      - name: Create inventory
        working-directory: infra/ansible
        run: |
          cat > hosts.ci.ini <<EOF
          [frontend_vm]
          ${{ secrets.FRONTEND_VM_IP }} ansible_user=azureuser ansible_ssh_private_key_file=/home/runner/.ssh/frontend_vm_key ansible_ssh_common_args='-o IdentitiesOnly=yes'

          [kubernetes_deployer]
          localhost ansible_connection=local
          EOF

      - name: Deploy frontend container
        working-directory: infra/ansible
        env:
          ANSIBLE_INVENTORY: hosts.ci.ini
          DOCKER_REGISTRY_USERNAME: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          DOCKER_REGISTRY_PASSWORD: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
        run: |
          ansible-playbook -i hosts.ci.ini playbooks/deploy-docker.yml

  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          printf '%s' "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy AKS manifests
        working-directory: infra/ansible
        env:
          ANSIBLE_INVENTORY: hosts.ini
        run: |
          ansible-playbook -i hosts.ini playbooks/deploy-k8s.yml
