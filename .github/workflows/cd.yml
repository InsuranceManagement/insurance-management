name: cd

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: Environment to deploy
        required: true
        default: prod
        type: choice
        options:
          - prod
          - homolog

concurrency:
  group: cd-main
  cancel-in-progress: true

env:
  DEPLOY_ENVIRONMENT: ${{ github.event_name == 'push' && 'homolog' || inputs.deploy_environment }}
  BACKEND_IMAGE: lucascastelano/insurance-management-backend:${{ github.event_name == 'push' && 'homolog' || inputs.deploy_environment }}
  FRONTEND_IMAGE: lucascastelano/insurance-management-frontend:${{ github.event_name == 'push' && 'homolog' || inputs.deploy_environment }}
  NEXT_PUBLIC_API_URL: ${{ (github.event_name == 'push' || inputs.deploy_environment == 'homolog') && 'https://apim-insurance-management.azure-api.net/homolog/api' || 'https://apim-insurance-management.azure-api.net/api' }}
  NEXT_PUBLIC_BASE_PATH: ${{ (github.event_name == 'push' || inputs.deploy_environment == 'homolog') && '/homolog' || '' }}

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login Docker registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Build frontend image
        run: |
          docker build \
            -t ${{ env.FRONTEND_IMAGE }} \
            -f infra/frontend/Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }} \
            --build-arg NEXT_PUBLIC_BASE_PATH=${{ env.NEXT_PUBLIC_BASE_PATH }} \
            frontend

      - name: Push frontend image
        run: docker push ${{ env.FRONTEND_IMAGE }}

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible
          ansible-galaxy collection install community.docker

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.FRONTEND_SSH_PRIVATE_KEY_B64 }}" | base64 -d > ~/.ssh/frontend_vm_key
          chmod 600 ~/.ssh/frontend_vm_key

      - name: Create inventory
        working-directory: infra/ansible
        run: |
          cat > hosts.ci.ini <<EOF
          [frontend_vm]
          ${{ secrets.FRONTEND_VM_IP }} ansible_user=azureuser ansible_ssh_private_key_file=/home/runner/.ssh/frontend_vm_key ansible_ssh_common_args='-o IdentitiesOnly=yes'

          [kubernetes_deployer]
          localhost ansible_connection=local
          EOF

      - name: Deploy frontend container
        working-directory: infra/ansible
        env:
          ANSIBLE_INVENTORY: hosts.ci.ini
          DOCKER_REGISTRY_USERNAME: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          DOCKER_REGISTRY_PASSWORD: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
        run: |
          ansible-playbook -i hosts.ci.ini playbooks/deploy-docker.yml -e deploy_environment=${{ env.DEPLOY_ENVIRONMENT }}

  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login Docker registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Build backend image
        run: |
          docker build \
            -t ${{ env.BACKEND_IMAGE }} \
            -f infra/backend/Dockerfile \
            backend

      - name: Push backend image
        run: docker push ${{ env.BACKEND_IMAGE }}

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          printf '%s' "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy AKS manifests
        working-directory: infra/ansible
        env:
          ANSIBLE_INVENTORY: hosts.ini
        run: |
          ansible-playbook -i hosts.ini playbooks/deploy-k8s.yml -e deploy_environment=${{ env.DEPLOY_ENVIRONMENT }}
